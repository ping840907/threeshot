<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Mobile 3D Low-Poly Game</title>
  <style>
    /* 消除手機端預設邊距與滾動條 */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-user-select: none; /* 防止長按選取文字 */
      user-select: none;
    }
    html, body {
      overflow: hidden;
      width: 100%;
      height: 100%;
      background-color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      
      /* 🚀 專家手遊優化：全面封鎖瀏覽器預設的網頁縮放、下拉重整與側滑上一頁手勢 */
      touch-action: none;
      overscroll-behavior: none;
    }
    /* 遊戲畫面 Canvas */
    #game-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      /* 確保 Canvas 本身也不會觸發任何瀏覽器預設手勢 */
      touch-action: none; 
    }
    /* 進入遊戲開始畫面 */
    #start-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      background: radial-gradient(circle, #2c3e50, #0f172a);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.5s ease;
    }
    #start-btn {
      padding: 16px 40px;
      font-size: 1.25rem;
      font-weight: bold;
      color: #ffffff;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      border: none;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 75, 43, 0.4);
      outline: none;
      -webkit-tap-highlight-color: transparent; /* 消除 iOS 點擊時的灰色高亮方塊 */
    }
    #start-btn:active {
      transform: scale(0.95);
    }
    .hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>

  <div id="start-overlay">
    <button id="start-btn">進入遊戲</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
